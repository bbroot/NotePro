name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            arch: aarch64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            arch: x64
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            arch: x64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend deps
        shell: bash
        run: |
          rm -f package-lock.json
          npm install

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build Tauri app
        run: npm run tauri:build -- --target ${{ matrix.target }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Re-sign macOS app + recreate dmg
        if: matrix.platform == 'macos-latest'
        run: |
          set -e
          VERSION=$(node -p "require('./package.json').version")

          APP_PATH=$(find src-tauri/target -name "*.app" -path "*/bundle/macos/*" | head -1)
          echo "App: $APP_PATH"

          codesign --force --deep --sign - "$APP_PATH"
          codesign --deep --verify --verbose=4 "$APP_PATH"
          echo "App re-signed"

          # Standard dmg layout: app + Applications symlink (no scripts)
          STAGE=$(mktemp -d)
          cp -R "$APP_PATH" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"

          DMG="src-tauri/target/release/bundle/dmg/QNote_${VERSION}_aarch64.dmg"
          mkdir -p "$(dirname "$DMG")"
          hdiutil create -volname "QNote" -srcfolder "$STAGE" -ov -format UDZO "$DMG"
          rm -rf "$STAGE"
          echo "DMG: $DMG"

      - name: Pack portable (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          EXE=$(find src-tauri/target -name "*.exe" -path "*/bundle/*" | head -1)
          if [ -f "$EXE" ]; then
            mkdir -p artifacts/portable
            cp "$EXE" "artifacts/portable/QNote-${{ matrix.platform }}-v$(node -p 'require("./package.json").version').exe"
            echo "Portable exe copied"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            src-tauri/target/**/bundle/**/*.dmg
            src-tauri/target/**/bundle/**/*.app
            src-tauri/target/**/bundle/**/*.msi
            src-tauri/target/**/bundle/**/*.exe
            src-tauri/target/**/bundle/**/*.deb
            src-tauri/target/**/bundle/**/*.AppImage
            artifacts/portable/*
          if-no-files-found: error

  release:
    needs: build
    if: success()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Clean existing release
        uses: actions/github-script@v7
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        with:
          script: |
            const tag = `v${process.env.VERSION}`;
            try {
              const { data: rel } = await github.rest.repos.getReleaseByTag({
                ...context.repo, tag
              });
              console.log(`Deleting release id=${rel.id}`);
              await github.rest.repos.deleteRelease({ ...context.repo, release_id: rel.id });
            } catch (e) {
              console.log(`No release for ${tag}: ${e.status}`);
            }

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Create & Upload Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          REQ="{\"tag_name\":\"v$VERSION\",\"name\":\"QNote v$VERSION\"}"
          RESP=$(curl -s -X POST -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${{ github.repository }}/releases" -d "$REQ")
          echo "Create release: $RESP"
          UPLOAD_BASE=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['upload_url'].split('{')[0])")
          echo "Upload base: $UPLOAD_BASE"
          find artifacts -type f | while IFS= read -r f; do
            NAME=$(basename "$f")
            echo "Uploading $NAME ($(wc -c < "$f") bytes)..."
            curl -s -X POST -H "Authorization: Bearer $GITHUB_TOKEN" -H "Content-Type: application/octet-stream" "$UPLOAD_BASE?name=$NAME" --data-binary "@$f"
            echo " done"
          done
