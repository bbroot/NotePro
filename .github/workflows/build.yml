name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            arch: aarch64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            arch: x64
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            arch: x64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend deps
        shell: bash
        run: |
          rm -f package-lock.json
          npm install

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build Tauri app
        run: npm run tauri:build -- --target ${{ matrix.target }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Re-sign macOS app + recreate dmg
        if: matrix.platform == 'macos-latest'
        run: |
          BUNDLE_DIR=$(find src-tauri/target -name "*.app" -path "*/bundle/macos/*" -exec dirname {} \; | head -1)
          APP_PATH="$BUNDLE_DIR/QNote.app"
          DMG_DIR=$(dirname "$(dirname "$BUNDLE_DIR")")
          VERSION=$(node -p "require('./package.json').version")

          # Re-sign the app
          codesign --force --deep --sign - "$APP_PATH"
          codesign --deep --verify --verbose=4 "$APP_PATH"
          echo "App re-signed"

          # Recreate dmg with re-signed app only
          OLD_DMG=$(find "$DMG_DIR" -name "*.dmg" | head -1)
          NEW_DMG="$BUNDLE_DIR/QNote_${VERSION}_aarch64.dmg"
          hdiutil create -volname "QNote" -srcfolder "$BUNDLE_DIR" -ov -format UDZO "$NEW_DMG"
          rm -f "$OLD_DMG"
          echo "DMG created: $NEW_DMG"

      - name: Pack portable (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          EXE=$(find src-tauri/target -name "*.exe" -path "*/bundle/*" | head -1)
          if [ -f "$EXE" ]; then
            mkdir -p artifacts/portable
            cp "$EXE" "artifacts/portable/QNote-${{ matrix.platform }}-v$(node -p 'require("./package.json").version').exe"
            echo "Portable exe copied"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            src-tauri/target/**/bundle/**/*.dmg
            src-tauri/target/**/bundle/**/*.app
            src-tauri/target/**/bundle/**/*.msi
            src-tauri/target/**/bundle/**/*.exe
            src-tauri/target/**/bundle/**/*.deb
            src-tauri/target/**/bundle/**/*.AppImage
            artifacts/portable/*
          if-no-files-found: error

