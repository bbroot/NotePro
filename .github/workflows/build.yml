name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            arch: aarch64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            arch: x64
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            arch: x64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend deps
        shell: bash
        run: |
          rm -f package-lock.json
          npm install

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build Tauri app
        run: npm run tauri:build -- --target ${{ matrix.target }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Re-sign macOS app + recreate dmg
        if: matrix.platform == 'macos-latest'
        run: |
          # Find the app bundle
          APP_PATH=$(find src-tauri/target -name "*.app" -path "*/bundle/macos/*" | head -1)
          BUNDLE_DIR=$(dirname "$APP_PATH")
          DMG_DIR=$(dirname "$BUNDLE_DIR")/../dmg
          VERSION=$(node -p "require('./package.json').version")

          echo "App: $APP_PATH"
          echo "Bundle dir: $BUNDLE_DIR"

          # Re-sign the app (fixes Tauri's ad-hoc signature issue)
          codesign --force --deep --sign - "$APP_PATH"
          codesign --deep --verify --verbose=4 "$APP_PATH"
          echo "App re-signed and verified"

          # Create staging folder with proper dmg layout (app + Applications symlink)
          STAGE="$BUNDLE_DIR/dmg-stage"
          mkdir -p "$STAGE"
          cp -R "$APP_PATH" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"

          # Create new dmg
          OLD_DMG=$(find "$DMG_DIR" -name "*.dmg" | head -1)
          NEW_DMG="$BUNDLE_DIR/QNote_${VERSION}_aarch64.dmg"
          hdiutil create -volname "QNote" -srcfolder "$STAGE" -ov -format UDZO "$NEW_DMG"
          rm -rf "$STAGE" "$OLD_DMG"
          echo "New DMG: $NEW_DMG"

      - name: Pack portable (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          EXE=$(find src-tauri/target -name "*.exe" -path "*/bundle/*" | head -1)
          if [ -f "$EXE" ]; then
            mkdir -p artifacts/portable
            cp "$EXE" "artifacts/portable/QNote-${{ matrix.platform }}-v$(node -p 'require("./package.json").version').exe"
            echo "Portable exe copied"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            src-tauri/target/**/bundle/**/*.dmg
            src-tauri/target/**/bundle/**/*.app
            src-tauri/target/**/bundle/**/*.msi
            src-tauri/target/**/bundle/**/*.exe
            src-tauri/target/**/bundle/**/*.deb
            src-tauri/target/**/bundle/**/*.AppImage
            artifacts/portable/*
          if-no-files-found: error

  release:
    needs: build
    if: success()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Delete existing release
        run: |
          gh release delete "v${{ steps.version.outputs.VERSION }}" -y --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: QNote v${{ steps.version.outputs.VERSION }}
          body: >
            QNote Markdown Editor v${{ steps.version.outputs.VERSION }}

            **macOS**: 下载 dmg → 拖 QNote.app 到 Applications →
            终端执行: xattr -cr /Applications/QNote.app

            Portable: .exe/.AppImage 直接运行。
            Installers: .msi / .dmg / .deb
          prerelease: false
          files: artifacts/**/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
