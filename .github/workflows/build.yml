name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            arch: aarch64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            arch: x64
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            arch: x64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend deps
        shell: bash
        run: |
          rm -f package-lock.json
          npm install

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Import macOS certificates
        if: matrix.platform == 'macos-latest'
        env:
          CERT_MAC_APP_DIST: ${{ secrets.CERTIFICATE_MAC_APP_DIST }}
          CERT_DEVELOPER_ID: ${{ secrets.CERTIFICATE_DEVELOPER_ID_APP }}
          CERT_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERT_MAC_APP_DIST" | base64 -d > /tmp/mac_app.p12
          echo "$CERT_DEVELOPER_ID" | base64 -d > /tmp/dev_id_app.p12
          security create-keychain -p temp build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p temp build.keychain
          security import /tmp/mac_app.p12 -k build.keychain \
            -P "$CERT_PASSWORD" -T /usr/bin/codesign 2>&1
          security import /tmp/dev_id_app.p12 -k build.keychain \
            -P "$CERT_PASSWORD" -T /usr/bin/codesign 2>&1
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k temp build.keychain 2>&1
          echo "Certs imported"
          security find-identity -v -p codesigning 2>&1

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build Tauri app
        run: npm run tauri:build -- --target ${{ matrix.target }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notarize macOS DMG
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -e
          DMG=$(find src-tauri/target -name "*.dmg" -path "*/bundle/*" | head -1)
          if [ -z "$DMG" ]; then
            echo "No DMG found, skipping notarization"
            exit 0
          fi
          echo "Notarizing: $DMG"
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --team-id "2X3285DG44" \
            --password "$APPLE_PASSWORD" \
            --wait 2>&1
          echo "Stapling ticket..."
          xcrun stapler staple "$DMG" 2>&1 || echo "Staple skipped (not always needed)"

      - name: Validate macOS build
        if: matrix.platform == 'macos-latest'
        run: |
          echo "=== BINARY CHECK ==="
          find src-tauri/target -name "*.app" -path "*/bundle/*" -exec codesign -dvv {} \; 2>&1 | head -20
          echo "=== DMG CHECK ==="
          find src-tauri/target -name "*.dmg" -path "*/bundle/*" -exec spctl -a -t open --context context:primary-signature -v {} \; 2>&1 || true
          echo "=== PKG CHECK ==="
          find src-tauri/target -name "*.pkg" -path "*/bundle/*" -exec pkgutil --check-signature {} \; 2>&1 || true

      - name: Upload to App Store Connect
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -e
          PKG=$(find src-tauri/target -name "*.pkg" -path "*/bundle/*" | head -1)
          if [ -z "$PKG" ]; then
            echo "No .pkg found, skipping App Store upload"
            exit 0
          fi
          echo "Uploading to App Store Connect: $PKG"
          xcrun altool --upload-app -f "$PKG" \
            --type macos \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --bundle-id "com.bbroot.QNote" 2>&1 || echo "Upload failed - you may need to upload manually via Transporter"

      - name: Pack portable (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          EXE=$(find src-tauri/target -name "*.exe" -path "*/bundle/*" | head -1)
          if [ -f "$EXE" ]; then
            mkdir -p artifacts/portable
            cp "$EXE" "artifacts/portable/NotePro-${{ matrix.platform }}-v$(node -p 'require("./package.json").version').exe"
            echo "Portable exe copied"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            src-tauri/target/**/bundle/**/*.dmg
            src-tauri/target/**/bundle/**/*.app
            src-tauri/target/**/bundle/**/*.msi
            src-tauri/target/**/bundle/**/*.exe
            src-tauri/target/**/bundle/**/*.deb
            src-tauri/target/**/bundle/**/*.AppImage
            artifacts/portable/*
          if-no-files-found: error

  release:
    needs: build
    if: success()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Clean existing release
        uses: actions/github-script@v7
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        with:
          script: |
            const tag = `v${process.env.VERSION}`;
            try {
              const { data: rel } = await github.rest.repos.getReleaseByTag({
                ...context.repo, tag
              });
              console.log(`Deleting release id=${rel.id}`);
              await github.rest.repos.deleteRelease({ ...context.repo, release_id: rel.id });
            } catch (e) {
              console.log(`No release for ${tag}: ${e.status}`);
            }

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Create & Upload Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          REQ="{\"tag_name\":\"v$VERSION\",\"name\":\"Note Pro v$VERSION\"}"
          RESP=$(curl -s -X POST -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${{ github.repository }}/releases" -d "$REQ")
          echo "Create release: $RESP"
          UPLOAD_BASE=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['upload_url'].split('{')[0])")
          echo "Upload base: $UPLOAD_BASE"
          find artifacts -type f | while IFS= read -r f; do
            NAME=$(basename "$f")
            echo "Uploading $NAME ($(wc -c < "$f") bytes)..."
            curl -s -X POST -H "Authorization: Bearer $GITHUB_TOKEN" -H "Content-Type: application/octet-stream" "$UPLOAD_BASE?name=$NAME" --data-binary "@$f"
            echo " done"
          done
